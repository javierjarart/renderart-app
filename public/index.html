<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Canvas Render Studio</title>
    <style>
        :root { --bg: #121212; --panel: #1e1e1e; --text: #e0e0e0; --accent: #bb86fc; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: var(--bg); color: var(--text); display: flex; justify-content: center; padding: 40px; margin: 0; }
        .studio-container { background: var(--panel); padding: 30px; border-radius: 12px; width: 450px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        h1 { text-align: center; margin-top: 0; color: var(--accent); }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-size: 14px; font-weight: bold; color: #aaa; }
        input, select { width: 100%; padding: 10px; background: #2c2c2c; border: 1px solid #444; border-radius: 6px; color: white; box-sizing: border-box; }
        .row { display: flex; gap: 15px; }
        button { width: 100%; padding: 15px; background: var(--accent); color: #000; border: none; border-radius: 6px; font-size: 16px; font-weight: bold; cursor: pointer; transition: 0.3s; margin-top: 10px; }
        button:hover { background: #9a67ea; }
        button:disabled { background: #555; cursor: not-allowed; }
        
        /* Barra de progreso */
        .progress-box { display: none; margin-top: 25px; text-align: center; }
        .progress-bar { width: 100%; background: #333; border-radius: 10px; overflow: hidden; height: 20px; margin-top: 10px; }
        .progress-fill { width: 0%; height: 100%; background: var(--accent); transition: width 0.3s; }
        #downloadLink { display: none; margin-top: 15px; text-align: center; color: #03dac6; font-weight: bold; text-decoration: none; border: 1px solid #03dac6; padding: 10px; border-radius: 6px;}
        #downloadLink:hover { background: rgba(3, 218, 198, 0.1); }
    </style>
</head>
<body>

    <div class="studio-container">
        <h1>Canvas Render Studio</h1>
        <form id="renderForm">
            <div class="form-group">
                <label>Seleccionar Proyecto:</label>
                <select id="project" required>
                    <option value="">Cargando proyectos...</option>
                </select>
                <small style="color:#777; font-size:12px;">Pon tus carpetas en la carpeta local /proyectos</small>
            </div>

            <div class="row">
                <div class="form-group" style="flex: 1;">
                    <label>Ancho (px)</label>
                    <input type="number" id="width" value="1920" required>
                </div>
                <div class="form-group" style="flex: 1;">
                    <label>Alto (px)</label>
                    <input type="number" id="height" value="1080" required>
                </div>
            </div>

            <div class="row">
                <div class="form-group" style="flex: 1;">
                    <label>FPS</label>
                    <input type="number" id="fps" value="60" required>
                </div>
                <div class="form-group" style="flex: 1;">
                    <label>Duración (seg)</label>
                    <input type="number" id="duration" value="10" required>
                </div>
            </div>

            <div class="form-group">
                <label>Color de fondo (para píxeles transparentes)</label>
                <input type="color" id="bgColor" value="#000000" style="height: 40px; padding: 2px;">
            </div>

            <button type="submit" id="btnRender">▶ Iniciar Render</button>
        </form>

        <div class="progress-box" id="progressBox">
            <div id="statusText">Renderizando: 0%</div>
            <div class="progress-bar">
                <div class="progress-fill" id="progressFill"></div>
            </div>
            <a id="downloadLink" href="#" download>⬇ Descargar Video (MP4)</a>
        </div>
    </div>

    <script>
        // Cargar proyectos al inicio
        fetch('/api/projects').then(r => r.json()).then(projects => {
            const select = document.getElementById('project');
            select.innerHTML = projects.length === 0 
                ? '<option value="">No hay carpetas en /proyectos</option>' 
                : projects.map(p => `<option value="${p}">${p}</option>`).join('');
        });

        document.getElementById('renderForm').onsubmit = async (e) => {
            e.preventDefault();
            
            const btn = document.getElementById('btnRender');
            const progressBox = document.getElementById('progressBox');
            const progressFill = document.getElementById('progressFill');
            const statusText = document.getElementById('statusText');
            const downloadLink = document.getElementById('downloadLink');

            btn.disabled = true;
            btn.innerText = "⏳ Renderizando...";
            progressBox.style.display = 'block';
            downloadLink.style.display = 'none';
            progressFill.style.width = '0%';

            // Enviar datos
            await fetch('/api/render', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    project: document.getElementById('project').value,
                    width: document.getElementById('width').value,
                    height: document.getElementById('height').value,
                    fps: document.getElementById('fps').value,
                    duration: document.getElementById('duration').value,
                    bgColor: document.getElementById('bgColor').value
                })
            });

            // Polling: Consultar progreso cada 1 segundo
            const interval = setInterval(async () => {
                const res = await fetch('/api/status');
                const status = await res.json();

                if (status.state === 'rendering') {
                    const percent = Math.round((status.progress / status.total) * 100);
                    statusText.innerText = `Renderizando: ${status.progress} / ${status.total} cuadros (${percent}%)`;
                    progressFill.style.width = `${percent}%`;
                } else if (status.state === 'done') {
                    clearInterval(interval);
                    statusText.innerText = `¡Render completado exitosamente! 🎉`;
                    progressFill.style.width = `100%`;
                    downloadLink.href = status.fileUrl;
                    downloadLink.style.display = 'block';
                    btn.disabled = false;
                    btn.innerText = "▶ Iniciar Nuevo Render";
                } else if (status.state === 'error') {
                    clearInterval(interval);
                    statusText.innerText = `❌ Error: ${status.error}`;
                    btn.disabled = false;
                    btn.innerText = "▶ Reintentar";
                }
            }, 1000);
        };
    </script>
</body>
</html>
